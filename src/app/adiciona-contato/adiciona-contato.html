<h1>Agenda</h1>

<form>
    <div>
        <label for="nome">Nome</label>
        <input type="text" name="" id="nome" #nm>
    </div>
    <div>
    <div>
        <label for="aniv">Aniversario</label>
        <input type="text" name="nome" id="aniv" #an>
    </div>
     <div>
        <label for="tipo">Tipo</label>
        <select name="nome" id="tipo" #tipo>
            <option *ngFor="let op of opcoesContato" [value]="op">
                {{op}}
            </option>
        </select>
    </div>
        <input type="button" value="Adicionar"
               (click)="adicionar(nm.value, an.value, '')">
    </div>
</form>
